# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = false

# Advisories configuration - check for known security vulnerabilities
[advisories]
# Ignore advisories that have no available fix
ignore = [
    # rsa: Marvin Attack - no fix available yet, used by jwt-simple/superboring
    # This is a timing side-channel vulnerability in RSA decryption
    # Monitor: https://rustsec.org/advisories/RUSTSEC-2023-0071
    "RUSTSEC-2023-0071",
    # paste: unmaintained - transitive dependency through simba->nalgebra->statrs
    # No action needed as it's maintained enough for our use case
    "RUSTSEC-2024-0436",
]

# License configuration - ensure all dependencies have acceptable licenses
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "Unicode-3.0",
    "BSL-1.0",
    "OpenSSL",
    "Unlicense",
]
confidence-threshold = 0.8

# Bans configuration - deny specific crates or versions
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

# Sources configuration - control where crates can come from
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
