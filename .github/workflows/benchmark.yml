name: Benchmark

on:
  push:
    branches: [ main ]
    paths:
      - 'benches/**'
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [ main ]
    paths:
      - 'benches/**'
      - 'src/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check-benchmarks:
    name: Check for Benchmarks
    runs-on: ubuntu-latest
    outputs:
      has_benchmarks: ${{ steps.check.outputs.has_benchmarks }}
    steps:
      - uses: actions/checkout@v5
      - name: Check if benchmarks exist
        id: check
        run: |
          if [ -d "benches" ] && [ "$(ls -A benches/*.rs 2>/dev/null)" ]; then
            echo "has_benchmarks=true" >> $GITHUB_OUTPUT
          else
            echo "has_benchmarks=false" >> $GITHUB_OUTPUT
            echo "No benchmark files found in benches/ directory"
          fi

  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    needs: check-benchmarks
    if: needs.check-benchmarks.outputs.has_benchmarks == 'true'
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev pkg-config

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Install cargo-criterion
        run: cargo install cargo-criterion

      - name: Run benchmarks
        run: cargo criterion --message-format=json > benchmark-results.json

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'cargo'
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '200%'
          comment-on-alert: true
          fail-on-alert: false
          alert-comment-cc-users: '@hephaex'

  skip-benchmark:
    name: Skip Benchmarks
    runs-on: ubuntu-latest
    needs: check-benchmarks
    if: needs.check-benchmarks.outputs.has_benchmarks != 'true'
    steps:
      - name: No benchmarks to run
        run: echo "No benchmark files found. Skipping benchmark run."
